name: retro

# Rétrospective hebdomadaire (self-learning étage 2) — dimanche 20:00 UTC,
# marchés fermés. Le bot analyse sa semaine et amende state/doctrine_tactics.md.
on:
  schedule:
    - cron: "0 20 * * 0"    # dimanche 20:00 UTC
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: trade               # même groupe que le trading: jamais en parallèle
  cancel-in-progress: false

jobs:
  retro:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run weekly retrospective
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python retro.py
      - name: Commit retro & updated tactics
        if: always()
        run: |
          git config user.name "etoro-agent-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ state/
          if git diff --cached --quiet; then
            echo "Aucun changement."
            exit 0
          fi
          git commit -m "retro: $(date -u +'%Y-%m-%d')"
          n=0
          until git push; do
            n=$((n+1)); [ "$n" -gt 2 ] && { echo "push KO"; exit 1; }
            git pull --rebase
          done
